<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="Styles/style.css" rel="stylesheet">
    <title>Title</title>
</head>
<body>
<form action="#" method="post">
    <fieldset>
        <legend>Persoonlijke informatie</legend>
        <p>
            <label for="firstname">Voornaam*: </label>
            <input type="text" id="firstname" name="firstname" placeholder="Your first name" required>
        </p>
        <p>
            <label for="lastname">Familienaam*: </label>
            <input type="text" id="lastname" name="lastname" placeholder="Your last name" required>
        </p>
    </fieldset>
    <fieldset>
        <legend>Sport</legend>
        <p>Welke sport beoefen je?</p>
        <p>
            <input type="checkbox" id="lopen" name="sport" value="lopen">
            <label for="lopen">Lopen</label>
        </p>
        <p>
            <input type="checkbox" id="zwemmen" name="sport" value="zwemmen">
            <label for="zwemmen">Zwemmen</label>
        </p>
        <p>
            <input type="checkbox" id="roeien" name="sport" value="roeien">
            <label for="roeien">Roeien</label>
        </p>
    </fieldset>
    <fieldset>
        <legend>Communicatievoorkeur</legend>
        <p>Hoe kunnen we je bereiken?</p>
        <p>
            <input type="radio" id="post" name="communicatie" value="post">
            <label for="post">Per post</label>
        </p>
        <p>
            <input type="radio" id="email" name="communicatie" value="email">
            <label for="email">E-mail</label>
        </p>
    </fieldset>
    <fieldset>
        <legend>Favorieten</legend>
        <p>
            <label for="favfilm">Favoriete film: </label>
            <input type="text" id="favfilm" name="favfilm">
        </p>
        <p>
            <label for="favquote">Favoriete quote: </label>
            <textarea id="favquote" name="favquote" placeholder="Schrijf je favoriete quote"></textarea>
        </p>
        <p>
            <label for="favfood">Favoriete eten: </label>
            <select id="favfood" name="favfood">
                <option value="hamburger">Hamburger</option>
                <option value="hotdog">Hot-dog</option>
                <option value="pizza">Pizza</option>
            </select>
        </p>
        <p>
            <label for="favbrowser">Favoriete browser: </label>
            <input type="text" id="favbrowser" name="favbrowser">
        </p>
    </fieldset>
    <fieldset>
        <legend>Beveiliging &amp; contact</legend>
        <p>
            <label for="password">Wachtwoord*: </label>
            <input type="password" id="password" name="password" required>
        </p>
        <p>
            <label for="emailadres">E-mailadres: </label>
            <input type="email" id="emailadres" name="emailadres" placeholder="Geef je e-mailadres in">
        </p>
        <p>
            <label for="favsite">Favoriete site: </label>
            <input type="url" id="favsite" name="favsite" placeholder="Geef de URL van je favoriete site">
        </p>
    </fieldset>
    <fieldset>
        <legend>Extra informatie</legend>
        <p>
            <label for="favnum1">Favoriete getal tussen 1-10: </label>
            <input type="number" id="favnum1" name="favnum1" min="1" max="10">
        </p>
        <p>
            <label for="favnum2">Favoriete getal tussen 11-1000: </label>
            <input type="number" id="favnum2" name="favnum2" min="11" max="1000">
        </p>
        <p>
            <label for="geboortedatum">Wanneer ben je geboren? </label>
            <input type="date" id="geboortedatum" name="geboortedatum">
        </p>
        <p>
            <label for="postcode">Belgische postcode*: </label>
            <input type="number" id="postcode" name="postcode" min="1000" max="9999" placeholder="9999" required>
        </p>
    </fieldset>
    <fieldset>
        <legend>Varia</legend>
        <p>
            <label for="search">Zoeken naar iets: </label>
            <input type="search" id="search" name="search">
        </p>
        <p>
            <label for="kleur">Wat is je lievelingskleur? </label>
            <input type="color" id="kleur" name="kleur">
        </p>
        <p>
            <label for="bestand">Bestand kiezen: </label>
            <input type="file" id="bestand" name="bestand">
        </p>
    </fieldset>
    <p>
        <input type="submit" value="Submit">
    </p>
</form>
<script src="Scripts/script.js"></script>
</body>
</html>
